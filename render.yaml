services:
  - type: web
    name: vnstock-api
    env: python
    region: singapore   # IP Singapore - gần VN, ít bị chặn hơn US
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:10000 --workers 1 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
